name: Deploy Frontend & Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on:  ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- FRONTEND ----------
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: "/api/v1"

      - name: Deploy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: manish
          key: ${{ secrets.DO_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/bharat_standard_frontend"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: manish
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl reload nginx

      # ---------- BACKEND ----------
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: "mongodb://localhost:27017/unused"

      - name: Build backend
        working-directory: backend
        run: npm run build
        env:
          DATABASE_URL: "mongodb://localhost:27017/unused"

      - name: Deploy backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: manish
          key: ${{ secrets.DO_SSH_KEY }}
          source: "backend/dist,backend/package.json,backend/package-lock.json,backend/prisma"
          target: "/home/manish/bharat_standard/backend"
          strip_components: 1

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: manish
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/manish/bharat_standard/backend
            npm install --production
            npx prisma generate
            pm2 restart bharat_standard_backend || pm2 start dist/index.js --name bharat_standard_backend
            pm2 save

            
            
